app-id: io.github.easytier.EasyTierGUI
runtime: org.freedesktop.Platform
runtime-version: "24.08"
sdk: org.freedesktop.Sdk

sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
  - org.freedesktop.Sdk.Extension.node20

command: easytier-gui

finish-args:
  - --share=ipc
  - --share=network
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri

modules:
  - name: easytier-gui
    buildsystem: simple
    build-options:
      append-path: /usr/lib/sdk/rust-stable/bin:/usr/lib/sdk/node20/bin
      env:
        CARGO_HOME: /run/build/easytier-gui/.cache/cargo
        RUSTUP_HOME: /run/build/easytier-gui/.cache/rustup
        PNPM_HOME: /run/build/easytier-gui/.cache/pnpm-home
        PNPM_STORE_PATH: /run/build/easytier-gui/.cache/pnpm-store
        NODE_OPTIONS: --dns-result-order=ipv4first
    sources:
      - type: archive
        url: https://github.com/EasyTier/EasyTier/archive/refs/tags/v2.4.5.tar.gz
        sha256: 8bce53d0390bc9b2842bb863de1d4f18e6bb145fa41ec9d49683285e54423b98
      - type: file
        url: https://github.com/pnpm/pnpm/releases/download/v9.15.4/pnpm-linuxstatic-x64
        sha256: 2aab9d9e6e35f106c52c46b750c3a36277dd9a58cb517c818b5efc930cf3601c
        dest-filename: pnpm-linuxstatic-x64
      - type: file
        path: io.github.easytier.EasyTierGUI.desktop
      - type: file
        path: io.github.easytier.EasyTierGUI.metainfo.xml
    build-commands:
      # flatpak-builder runs each build-command in its own shell; keep everything in one script so env/cd persist.
      - |
        set -euxo pipefail

        export HOME="$PWD"
        export PATH="$CARGO_HOME/bin:$PATH"
        export NODE_OPTIONS="${NODE_OPTIONS:-} --dns-result-order=ipv4first"

        mkdir -p "$PNPM_HOME/bin" "$PNPM_STORE_PATH"
        install -Dm755 "$FLATPAK_BUILDER_BUILDDIR/pnpm-linuxstatic-x64" "$PNPM_HOME/bin/pnpm"
        PNPM="$PNPM_HOME/bin/pnpm"
        "$PNPM" -v

        src_dir="$(ls -d EasyTier-* 2>/dev/null | head -n 1 || true)"
        if [ -n "$src_dir" ]; then
          cd "$src_dir"
        fi
        if [ ! -d "easytier-gui" ]; then
          echo "Expected EasyTier sources in: $PWD"
          ls -la
          exit 1
        fi
        "$PNPM" config set store-dir "$PNPM_STORE_PATH"
        "$PNPM" config set dangerouslyAllowAllBuilds true
        "$PNPM" config set fetch-retries 7
        "$PNPM" config set fetch-retry-mintimeout 20000
        "$PNPM" config set fetch-retry-maxtimeout 120000
        "$PNPM" config set network-concurrency 2

        # CI DNS can be flaky; try a couple of registries before failing.
        ok=0
        for reg in https://registry.npmjs.org/ https://registry.npmmirror.com/ https://registry.yarnpkg.com/; do
          "$PNPM" config set registry "$reg"
          set +e
          "$PNPM" install --frozen-lockfile
          rc=$?
          set -e
          if [ "$rc" -eq 0 ]; then
            ok=1
            break
          fi
        done
        if [ "$ok" -ne 1 ]; then
          echo "pnpm install failed for all registries"
          exit 1
        fi
        "$PNPM" --dir easytier-web/frontend-lib build
        "$PNPM" --dir tauri-plugin-vpnservice build
        "$PNPM" --dir easytier-gui build

        cd easytier-gui/src-tauri
        cargo build --release --bins --features tauri/custom-protocol

        install -Dm755 target/release/easytier-gui /app/bin/easytier-gui
        install -Dm644 "$FLATPAK_BUILDER_BUILDDIR/io.github.easytier.EasyTierGUI.desktop" /app/share/applications/io.github.easytier.EasyTierGUI.desktop
        install -Dm644 "$FLATPAK_BUILDER_BUILDDIR/io.github.easytier.EasyTierGUI.metainfo.xml" /app/share/metainfo/io.github.easytier.EasyTierGUI.metainfo.xml

        icon_src=""
        if [ -f "icons/128x128.png" ]; then icon_src="icons/128x128.png"; fi
        if [ -z "$icon_src" ] && [ -f "icons/icon.png" ]; then icon_src="icons/icon.png"; fi
        if [ -n "$icon_src" ]; then
          install -Dm644 "$icon_src" /app/share/icons/hicolor/128x128/apps/io.github.easytier.EasyTierGUI.png
        fi
