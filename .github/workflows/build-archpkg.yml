name: build-archpkg

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          pacman -Syu --noconfirm --needed \
            rust protobuf git \
            clang llvm pkgconf zstd \
            nodejs pnpm python \
            webkit2gtk-4.1 gtk3 librsvg libayatana-appindicator

      - name: Restore build cache
        uses: actions/cache@v4
        with:
          path: |
            packaging/arch/src/cargo-home
            packaging/arch/src/target
            packaging/arch/src/pnpm-store
          key: archpkg-cache-${{ hashFiles('packaging/arch/PKGBUILD') }}
          restore-keys: |
            archpkg-cache-

      - name: Build Arch package(s)
        run: |
          useradd -m builder
          chown -R builder:builder "$GITHUB_WORKSPACE"
          su builder -c "cd packaging/arch && rm -rf pkg && ZSTD_SYS_USE_PKG_CONFIG=1 LIBCLANG_PATH=$(llvm-config --libdir) makepkg --noconfirm"

      - name: Upload package artifact(s)
        uses: actions/upload-artifact@v4
        with:
          name: easytier-archpkg
          path: packaging/arch/*.pkg.tar.zst
