name: build-archpkg

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          pacman -Syu --noconfirm --needed rust cargo protobuf git

      - name: Restore cargo cache
        uses: actions/cache@v4
        with:
          path: |
            packaging/arch/src/cargo-home
            packaging/arch/src/target
          key: archpkg-cargo-${{ hashFiles('packaging/arch/PKGBUILD') }}
          restore-keys: |
            archpkg-cargo-

      - name: Build Arch package
        run: |
          useradd -m builder
          chown -R builder:builder "$GITHUB_WORKSPACE"
          su builder -c "cd packaging/arch && rm -rf pkg && makepkg --noconfirm"

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: easytier-archpkg
          path: packaging/arch/*.pkg.tar.zst
