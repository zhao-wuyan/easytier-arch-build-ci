name: build-flatpak

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure DNS (reduce EAI_AGAIN)
        shell: bash
        run: |
          set -euxo pipefail
          sudo rm -f /etc/resolv.conf
          printf "nameserver 1.1.1.1\nnameserver 8.8.8.8\noptions timeout:2 attempts:3\n" | sudo tee /etc/resolv.conf
          cat /etc/resolv.conf

      - name: Prefer IPv4 (avoid ENETUNREACH on IPv6)
        shell: bash
        run: |
          set -euxo pipefail
          # Prefer IPv4 address selection in case IPv6 is present but unusable.
          echo "precedence ::ffff:0:0/96  100" | sudo tee -a /etc/gai.conf
          sudo sysctl -w net.ipv6.conf.all.disable_ipv6=1 net.ipv6.conf.default.disable_ipv6=1 || true

      - name: Work around npm registry DNS (hosts pin)
        shell: bash
        run: |
          set -euxo pipefail
          # Some runners intermittently fail DNS lookups for npm registries inside bubblewrap (EAI_AGAIN).
          # Pin the hostnames to known Anycast/Cloudflare IPs to bypass DNS.
          sudo tee -a /etc/hosts >/dev/null <<'EOF'
          104.16.0.34 registry.npmjs.org registry.yarnpkg.com
          104.16.1.34 registry.npmjs.org registry.yarnpkg.com
          104.16.2.34 registry.npmjs.org registry.yarnpkg.com
          104.16.3.34 registry.npmjs.org registry.yarnpkg.com
          EOF
          tail -n 20 /etc/hosts

      - name: Install Flatpak tooling
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder

      - name: Add Flathub remote
        shell: bash
        run: |
          set -euxo pipefail
          sudo flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo

      - name: Install runtime + SDK
        shell: bash
        run: |
          set -euxo pipefail
          sudo flatpak install -y flathub \
            org.freedesktop.Platform//24.08 \
            org.freedesktop.Sdk//24.08 \
            org.freedesktop.Sdk.Extension.rust-stable//24.08 \
            org.freedesktop.Sdk.Extension.node20//24.08

      - name: Restore flatpak-builder cache
        uses: actions/cache@v4
        with:
          path: .flatpak-builder/cache
          key: flatpak-builder-cache-${{ hashFiles('packaging/flatpak/io.github.easytier.EasyTierGUI.yml') }}
          restore-keys: |
            flatpak-builder-cache-

      - name: Build Flatpak (repo + bundle)
        shell: bash
        run: |
          set -euxo pipefail
          ok=0
          for i in 1 2 3; do
            rm -rf builddir repo
            if flatpak-builder --force-clean --repo=repo builddir packaging/flatpak/io.github.easytier.EasyTierGUI.yml; then
              ok=1
              break
            fi
            echo "flatpak-builder failed (attempt $i), retrying..."
            sleep "$((i * 15))"
          done
          if [ "$ok" -ne 1 ]; then
            echo "flatpak-builder failed after retries"
            exit 1
          fi
          flatpak build-bundle repo io.github.easytier.EasyTierGUI.flatpak io.github.easytier.EasyTierGUI \
            --runtime-repo=https://flathub.org/repo/flathub.flatpakrepo

      - name: Upload Flatpak bundle
        uses: actions/upload-artifact@v4
        with:
          name: easytier-gui-flatpak
          path: io.github.easytier.EasyTierGUI.flatpak
