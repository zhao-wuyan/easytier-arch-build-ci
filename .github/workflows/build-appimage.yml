name: build-appimage

on:
  push:
    branches: [ main ]
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "EasyTier version tag (e.g. 2.4.5)"
        required: true
        default: "2.4.5"
      arch_snapshot:
        description: "Arch Linux Archive snapshot date (YYYY/MM/DD) to control glibc compatibility (SteamOS 3.7 is glibc 2.41)"
        required: false
        default: "2025/10/01"

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        shell: bash
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
          INPUT_ARCH_SNAPSHOT: ${{ github.event.inputs.arch_snapshot }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [[ -n "${INPUT_VERSION}" ]]; then
            version="${INPUT_VERSION}"
          elif [[ "${REF_NAME}" == v* ]]; then
            version="${REF_NAME#v}"
          else
            version="$(sed -n 's/^pkgver=//p' packaging/arch/PKGBUILD | head -n 1)"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"

          # Pin to an Arch Linux Archive snapshot so the produced AppImage can run on older distros/SteamOS.
          # SteamOS currently ships glibc 2.41, so we must build against glibc <= 2.41.
          if [[ -n "${INPUT_ARCH_SNAPSHOT}" ]]; then
            snapshot="${INPUT_ARCH_SNAPSHOT}"
          else
            snapshot="2025/10/01"
          fi
          echo "arch_snapshot=${snapshot}" >> "$GITHUB_OUTPUT"

      - name: Pin pacman to Arch Linux Archive snapshot
        shell: bash
        run: |
          set -euxo pipefail
          snapshot='${{ steps.version.outputs.arch_snapshot }}'
          cat > /etc/pacman.d/mirrorlist <<EOF
          Server = https://archive.archlinux.org/repos/${snapshot}/\$repo/os/\$arch
          EOF
          # Downgrading across snapshots may hit transient file ownership conflicts when packages are split/merged.
          # If this happens, remove the old dropins package and allow pacman to overwrite the one known path.
          pacman -Syy --noconfirm
          pacman -Rdd --noconfirm libmakepkg-dropins || true
          pacman -Syyuu --noconfirm --overwrite /usr/share/makepkg/reproducible/python.sh

      - name: Install build dependencies
        run: |
          pacman -Syu --noconfirm --needed \
            curl tar xz \
            rust protobuf git \
            clang llvm pkgconf zstd \
            nodejs pnpm python \
            xdg-utils \
            fuse2 squashfs-tools \
            patchelf gstreamer gst-plugins-base gst-plugins-good \
            gdk-pixbuf2 \
            webkit2gtk-4.1 gtk3 librsvg libayatana-appindicator

      - name: Verify glibc version (SteamOS compatibility)
        shell: bash
        run: |
          set -euxo pipefail
          glibc_ver="$(ldd --version | head -n 1 | awk '{print $NF}')"
          echo "Container glibc: ${glibc_ver}"
          export GLIBC_VER="$glibc_ver"
          python - <<'PY'
          import os, re, sys
          v = os.environ["GLIBC_VER"]
          def parse(ver: str):
            m = re.match(r"^(\d+)\.(\d+)", ver.strip())
            if not m:
              raise SystemExit(f"cannot parse glibc version: {ver!r}")
            return int(m.group(1)), int(m.group(2))
          cur = parse(v)
          max_ok = parse("2.41")
          if cur > max_ok:
            raise SystemExit(
              f"glibc {v} is too new for SteamOS (2.41). "
              f"Choose an older arch_snapshot (YYYY/MM/DD) so glibc<=2.41."
            )
          PY

      - name: Restore cache (cargo + pnpm)
        uses: actions/cache/restore@v4
        with:
          path: |
            .cache/cargo/registry
            .cache/cargo/git
            .cache/target
            .cache/pnpm-store
            .cache/tauri
          key: appimage-cache-${{ steps.version.outputs.version }}-${{ github.run_id }}
          restore-keys: |
            appimage-cache-${{ steps.version.outputs.version }}-
            appimage-cache-

      - name: Sanity check bundler deps
        run: |
          set -euxo pipefail
          command -v xdg-open
          command -v mksquashfs
          command -v patchelf
          command -v gst-inspect-1.0
          # linuxdeploy-plugin-gtk uses gdk-pixbuf pkg-config dirs; on Arch the pacman hook may not have created them yet.
          if command -v pkgconf >/dev/null; then PC=pkgconf; else PC=pkg-config; fi
          gdk_bin_dir="$($PC --variable=gdk_pixbuf_binarydir gdk-pixbuf-2.0 || true)"
          gdk_mod_dir="$($PC --variable=gdk_pixbuf_moduledir gdk-pixbuf-2.0 || true)"
          for d in "$gdk_bin_dir" "$gdk_mod_dir"; do
            if [[ -n "${d}" && ! -e "${d}" ]]; then
              echo "Creating missing gdk-pixbuf dir: ${d}"
              mkdir -p "${d}"
            fi
          done

      - name: Download EasyTier sources
        run: |
          set -euxo pipefail
          curl -L -o easytier-src.tar.gz "https://github.com/EasyTier/EasyTier/archive/refs/tags/v${{ steps.version.outputs.version }}.tar.gz"
          tar -xf easytier-src.tar.gz

      - name: Build AppImage
        run: |
          set -euxo pipefail
          cd "EasyTier-${{ steps.version.outputs.version }}"

          export CARGO_HOME="$GITHUB_WORKSPACE/.cache/cargo"
          export CARGO_TARGET_DIR="$GITHUB_WORKSPACE/.cache/target"
          export PNPM_STORE_PATH="$GITHUB_WORKSPACE/.cache/pnpm-store"
          pnpm config set store-dir "$PNPM_STORE_PATH"

          # linuxdeploy is distributed as an AppImage; in CI containers FUSE is often unavailable.
          # This makes AppImages extract and run without FUSE mounts.
          export APPIMAGE_EXTRACT_AND_RUN=1
          # linuxdeploy's bundled strip may be too old for Arch libs using `.relr.dyn` (SHT_RELR),
          # so disable stripping to avoid hard failures.
          export NO_STRIP=1

          # Allow dependency install scripts in CI (esbuild, etc.)
          pnpm config set dangerouslyAllowAllBuilds true

          # CI/Node build may crash when loading vite-plugin-vue-devtools (it assumes browser localStorage).
          # This plugin is only for development, so strip it for packaging builds.
          sed -i "/vite-plugin-vue-devtools/d" easytier-gui/vite.config.ts
          sed -i "/VueDevTools()/d" easytier-gui/vite.config.ts

          # Some dependencies assume browser localStorage even during Node-side config loading.
          # Provide a minimal polyfill for the build process.
          cat > "$GITHUB_WORKSPACE/localstorage-polyfill.mjs" <<'EOF'
          if (typeof globalThis.localStorage === 'undefined') {
            const store = new Map();
            globalThis.localStorage = {
              getItem: (k) => (store.has(String(k)) ? store.get(String(k)) : null),
              setItem: (k, v) => { store.set(String(k), String(v)); },
              removeItem: (k) => { store.delete(String(k)); },
              clear: () => { store.clear(); },
              key: (i) => Array.from(store.keys())[i] ?? null,
              get length() { return store.size; },
            };
          }
          EOF
          export NODE_OPTIONS="--import $GITHUB_WORKSPACE/localstorage-polyfill.mjs"

          pnpm install --frozen-lockfile
          pnpm --dir easytier-web/frontend-lib build
          pnpm --dir tauri-plugin-vpnservice build

          # Build + bundle as AppImage (single file)
          if ! pnpm --dir easytier-gui tauri build --bundles appimage --verbose 2>&1 | tee "$GITHUB_WORKSPACE/tauri-build.log"; then
            echo "::group::tauri-build.log (tail)"
            tail -n 200 "$GITHUB_WORKSPACE/tauri-build.log" || true
            echo "::endgroup::"

            echo "::group::bundle dir listing"
            find "$CARGO_TARGET_DIR/release/bundle" -maxdepth 4 -type f -print || true
            echo "::endgroup::"
            exit 1
          fi

      - name: Save cache (cargo + pnpm)
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            .cache/cargo/registry
            .cache/cargo/git
            .cache/target
            .cache/pnpm-store
            .cache/tauri
          key: appimage-cache-${{ steps.version.outputs.version }}-${{ github.run_id }}

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: easytier-gui-build-log-${{ steps.version.outputs.version }}
          path: tauri-build.log
          if-no-files-found: ignore

      - name: Collect artifacts
        run: |
          set -euxo pipefail
          mkdir -p out
          # Tauri writes bundles to $CARGO_TARGET_DIR; we set it to $GITHUB_WORKSPACE/.cache/target in the build step.
          cp -v .cache/target/release/bundle/appimage/*.AppImage out/

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: easytier-gui-appimage-${{ steps.version.outputs.version }}
          path: out/*.AppImage
